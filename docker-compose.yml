services:
  postgres:
    image: postgres:16-alpine
    container_name: formulario-academico-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: formulario_academico
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d formulario_academico"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
